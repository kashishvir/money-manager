spring.application.name=MoneyManager

#MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/moneymanager
spring.datasource.username=root
spring.datasource.password=4325

server.servlet.context-path=/api/v1.0

#JPA Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Email Configuration (Defaulting to Brevo for Render Port 2525 compatibility)
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:2525}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp

# The email address that emails will be sent from (e.g. your verified Brevo or SendGrid email)
app.mail.sender=${APP_MAIL_SENDER:your_verified_email@example.com}

jwt.secret = bd1a9a93-ef5c-45b3-bae5-98213dd7cd28

money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL}

app.activation.url=${MONEY_MANAGER_BACKEND_URL}

